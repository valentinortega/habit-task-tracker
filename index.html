<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trulli Pijamadas — Invitaciones</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/valentinortega/trulli/refs/heads/main/favicon%20trulli.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/valentinortega/trulli/refs/heads/main/favicon%20trulli.png">

<!-- Open Graph -->
<meta property="og:title" content="Trulli Pijamadas — Invitaciones">
<meta property="og:description" content="Creá tu invitación personalizada para la pijamada">
<meta property="og:image" content="https://raw.githubusercontent.com/valentinortega/trulli/refs/heads/main/TRULLI%20OG.png">
<meta property="og:url" content="https://trulli.vercel.app">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800;900&family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --acqua:       #5BB8B0;
  --acqua-mid:   #74C3BC;
  --acqua-light: #A8D8D4;
  --acqua-pale:  #C4E3E0;
  --acqua-ghost: #D8EDEB;
  --acqua-bg:    #BDD9D6;
  --calce:       #FDFBE5;
  --notte:       #1C4753;
  --notte-mid:   #2A5F70;
  --text-soft:   #4A7A86;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--acqua-bg);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 0 0 60px;
  overflow-x: hidden;
}

/* ══════════════════════ FORM PAGE ══════════════════════ */
#page-form {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header con rayas verticales ── */
.form-hero {
  width: 100%;
  padding: 48px 28px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  position: relative;
  overflow: hidden;
  background: var(--acqua-bg);
}
/* Rayas solo en zona superior */
.form-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: repeating-linear-gradient(
    to right,
    transparent 0px,
    transparent 24px,
    rgba(91,184,176,0.38) 24px,
    rgba(91,184,176,0.38) 38px
  );
  -webkit-mask-image: linear-gradient(to bottom, black 0%, black 40%, transparent 85%);
  mask-image: linear-gradient(to bottom, black 0%, black 40%, transparent 85%);
  pointer-events: none;
  z-index: 0;
}
.form-logo { position: relative; z-index: 1; }
.form-logo img {
  height: 66px;
  display: block;
  filter: drop-shadow(0 3px 12px rgba(28,71,83,0.18));
}
.form-title-img {
  width: 100%;
  max-width: 275px;
  display: block;
  position: relative;
  z-index: 1;
}

/* ── Campos sobre fondo acqua-bg ── */
.form-card {
  width: 100%;
  padding: 4px 22px 4px;
}
.field-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 22px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label {
  font-weight: 800;
  font-size: 11px;
  color: var(--notte);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-left: 2px;
}
.field label svg { flex-shrink: 0; color: var(--notte); opacity: 0.8; }

.input-wrap { position: relative; display: flex; align-items: center; }
.input-wrap input, .input-wrap textarea {
  width: 100%;
  background: var(--calce);
  border: none;
  border-radius: 20px;
  padding: 15px 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--notte);
  outline: none;
  transition: box-shadow 0.2s, background 0.2s;
  resize: none;
  box-shadow: 0 2px 10px rgba(28,71,83,0.09);
}
.input-wrap input:focus, .input-wrap textarea:focus {
  background: white;
  box-shadow: 0 0 0 2.5px var(--acqua), 0 4px 18px rgba(28,71,83,0.12);
}
.input-wrap input::placeholder, .input-wrap textarea::placeholder {
  color: rgba(91,184,176,0.65);
  font-weight: 500;
}
.input-icon-btn {
  position: absolute; right: 14px; background: none; border: none;
  cursor: pointer; color: var(--notte); opacity: 0.4; padding: 4px;
  display: flex; align-items: center; transition: opacity 0.15s;
}
.input-icon-btn:hover { opacity: 0.75; }

/* ─── Calendar Picker ─── */
.picker-dropdown {
  position: absolute; top: calc(100% + 8px); left: 0; z-index: 200;
  background: white; border-radius: 20px;
  box-shadow: 0 16px 56px rgba(28,71,83,0.16);
  border: 1.5px solid rgba(91,184,176,0.18);
  padding: 18px; display: none; min-width: 300px;
}
.picker-dropdown.open { display: block; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-nav {
  background: var(--acqua-ghost); border: none; border-radius: 9px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--notte); font-size: 15px; transition: background 0.15s;
}
.cal-nav:hover { background: var(--acqua-pale); }
.cal-month-label { font-family: 'Comfortaa', cursive; font-weight: 700; font-size: 13px; color: var(--notte); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-day-name { text-align: center; font-size: 10px; font-weight: 800; color: var(--text-soft); letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 0; }
.cal-day { text-align: center; padding: 7px 2px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--notte); transition: background 0.12s, color 0.12s; }
.cal-day:hover { background: var(--acqua-ghost); }
.cal-day.empty { cursor: default; }
.cal-day.today { font-weight: 900; color: var(--acqua); }
.cal-day.selected { background: var(--acqua); color: white; font-weight: 800; }
.cal-day.other-month { color: #c5d8d6; }

/* Time Picker */
.time-picker { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 0 4px; }
.time-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.time-label { font-size: 10px; font-weight: 800; color: var(--text-soft); letter-spacing: 0.1em; text-transform: uppercase; }
.time-spin { display: flex; flex-direction: column; align-items: center; background: var(--calce); border: 1.5px solid rgba(91,184,176,0.2); border-radius: 14px; overflow: hidden; }
.time-spin button { background: none; border: none; cursor: pointer; color: var(--acqua); padding: 6px 18px; font-size: 15px; line-height: 1; transition: background 0.12s; }
.time-spin button:hover { background: var(--acqua-ghost); }
.time-val { font-family: 'Comfortaa', cursive; font-weight: 700; font-size: 26px; color: var(--notte); padding: 2px 14px; min-width: 62px; text-align: center; }
.time-sep { font-family: 'Pacifico', cursive; font-size: 28px; color: var(--acqua); margin-top: -4px; opacity: 0.7; }
.time-confirm { margin-top: 14px; width: 100%; background: var(--notte); color: white; border: none; border-radius: 11px; padding: 11px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; cursor: pointer; letter-spacing: 0.06em; transition: background 0.15s; }
.time-confirm:hover { background: var(--notte-mid); }

/* ─── Map picker ─── */
#map-modal { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(28,71,83,0.55); align-items: center; justify-content: center; padding: 20px; }
#map-modal.open { display: flex; }
.map-container { background: white; border-radius: 24px; width: 100%; max-width: 560px; overflow: hidden; box-shadow: 0 20px 80px rgba(28,71,83,0.25); }
.map-header { padding: 18px 22px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(91,184,176,0.15); }
.map-header h3 { font-family: 'Comfortaa', cursive; font-weight: 700; font-size: 15px; color: var(--notte); }
.map-close { background: var(--acqua-ghost); border: none; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; color: var(--notte); font-size: 16px; display: flex; align-items: center; justify-content: center; }
#map-search-wrap { padding: 12px 22px; border-bottom: 1px solid rgba(91,184,176,0.1); }
#map-search { width: 100%; background: var(--calce); border: 1.5px solid rgba(91,184,176,0.22); border-radius: 10px; padding: 10px 14px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600; color: var(--notte); outline: none; }
#map-search:focus { border-color: var(--acqua); }
#map-suggestions { list-style: none; margin-top: 6px; max-height: 160px; overflow-y: auto; border-radius: 10px; border: 1px solid rgba(91,184,176,0.15); display: none; }
#map-suggestions li { padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--notte); cursor: pointer; border-bottom: 1px solid rgba(91,184,176,0.08); transition: background 0.12s; }
#map-suggestions li:hover { background: var(--acqua-ghost); }
#map-suggestions li:last-child { border-bottom: none; }
#map-suggestions.open { display: block; }
#map-frame-wrap { height: 280px; position: relative; background: #e8f0f0; }
#leaflet-map { width: 100%; height: 100%; }
#map-click-hint { padding: 6px 22px; font-size: 11px; font-weight: 600; color: var(--acqua); background: rgba(91,184,176,0.08); border-bottom: 1px solid rgba(91,184,176,0.1); text-align: center; letter-spacing: 0.02em; }
#map-selected-info { padding: 7px 22px; font-size: 12px; font-weight: 700; color: var(--notte); min-height: 30px; border-bottom: 1px solid rgba(91,184,176,0.1); display: flex; align-items: center; gap: 6px; }
#map-selected-info:empty { display: none; }
.map-confirm-btn { margin: 14px 22px 18px; width: calc(100% - 44px); background: var(--notte); color: white; border: none; border-radius: 12px; padding: 13px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.map-confirm-btn:hover { background: var(--notte-mid); }

/* ══ BTN PREVIEW ══ */
.btn-preview-wrap { padding: 0 22px 24px; width: 100%; }
.btn-preview {
  width: 100%; background: var(--notte); color: white; border: none;
  border-radius: 20px; padding: 17px; font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 800; letter-spacing: 0.05em; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 8px 28px rgba(28,71,83,0.25);
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
}
.btn-preview:hover { background: var(--notte-mid); transform: translateY(-2px); box-shadow: 0 14px 36px rgba(28,71,83,0.28); }

/* Paginador */
.form-footer { width: 100%; padding: 0 22px 28px; display: flex; align-items: center; justify-content: center; gap: 6px; }
.form-footer-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(28,71,83,0.2); }
.form-footer-dot.active { background: var(--notte); width: 18px; border-radius: 3px; }
.form-footer-text { font-size: 11px; font-weight: 700; color: rgba(28,71,83,0.4); letter-spacing: 0.08em; text-transform: uppercase; margin-left: 8px; }

/* ══════════════════════ PREVIEW PAGE ══════════════════════ */
#page-preview { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 580px; gap: 18px; padding: 28px 16px 48px; }
.preview-topbar { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.btn-back { background: white; border: 1.5px solid rgba(91,184,176,0.22); border-radius: 12px; padding: 10px 18px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: var(--notte); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
.btn-back:hover { background: var(--acqua-ghost); }
.preview-label { font-family: 'Comfortaa', cursive; font-size: 11px; font-weight: 700; color: var(--acqua); letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.7; }

/* ═══ TARJETA ═══ */
#invitation-card { width: 360px; height: 640px; flex-shrink: 0; position: relative; overflow: hidden; border-radius: 18px; box-shadow: 0 20px 72px rgba(0,0,0,0.22); }
.inv-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; display: block; }
.inv-overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
.inv-header-block { position: absolute; top: 244px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 0 40px; }
.inv-hola-line { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; color: #1C4753; text-align: center; line-height: 1.4; }
.inv-hola-line .inv-nombre-invitado { font-weight: 900; color: #1C4753; }
.inv-anfitrion-line { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; color: #1C4753; text-align: center; line-height: 1.4; }
.inv-anfitrion-line .inv-anfitrion-nombre { font-weight: 900; color: #1C4753; }
.inv-info-block { position: absolute; top: 360px; left: 60px; right: 60px; display: flex; flex-direction: column; gap: 0; background: rgba(149,206,187,0.10); border-radius: 10px; border: 1px solid rgba(149,206,187,0.22); overflow: hidden; }
.inv-info-row { display: flex; align-items: center; gap: 8px; padding: 7px 11px; border-bottom: 1px solid rgba(149,206,187,0.13); }
.inv-info-row:last-child { border-bottom: none; }
.inv-info-icon { color: #95CEBB; opacity: 0.75; flex-shrink: 0; }
.inv-info-text { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; color: #1C4753; line-height: 1.3; }
.inv-info-text.empty { color: rgba(100,160,148,0.5); font-weight: 500; font-style: italic; }
.inv-ig { position: absolute; top: 428px; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 4px; color: #95CEBB; opacity: 0.9; }
.inv-ig span { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: 0.05em; }

/* ══ Action buttons ══ */
.action-btns { display: flex; gap: 12px; width: 100%; }
.btn-action { flex: 1; border: none; border-radius: 16px; padding: 15px 12px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.15s, box-shadow 0.15s; }
.btn-download { background: var(--notte); color: white; box-shadow: 0 6px 24px rgba(28,71,83,0.28); }
.btn-share { background: white; color: var(--notte); border: 1.5px solid rgba(91,184,176,0.22); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
.btn-action:hover { transform: translateY(-2px); }
.btn-download:hover { box-shadow: 0 10px 32px rgba(28,71,83,0.32); }

/* Toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--notte); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
.overlay { position: fixed; inset: 0; z-index: 100; display: none; }
.overlay.open { display: block; }
</style>
</head>
<body>

<!-- ══════════════════ PÁGINA 1: FORMULARIO ══════════════════ -->
<div id="page-form">

  <div class="form-hero">
    <div class="form-logo">
      <img src="https://raw.githubusercontent.com/valentinortega/trulli/refs/heads/main/marca.png" alt="Trulli Pijamadas" crossorigin="anonymous">
    </div>
    <img class="form-title-img" src="https://raw.githubusercontent.com/valentinortega/trulli/refs/heads/main/completa%20tus%20datos.png" alt="Completá tus datos" crossorigin="anonymous">
  </div>

  <div class="form-card">
    <div class="field-group">

      <div class="field">
        <label>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
          Anfitrión
        </label>
        <div class="input-wrap">
          <input type="text" id="f-anfitrion" placeholder="Nombre de quien invita">
        </div>
      </div>

      <div class="field">
        <label>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          Invitado
        </label>
        <div class="input-wrap">
          <input type="text" id="f-para" placeholder="Nombre del invitado/a">
        </div>
      </div>

      <div class="field">
        <label>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5C3.9 3 3 3.9 3 5v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
          Fecha
        </label>
        <div class="input-wrap" style="position:relative">
          <input type="text" id="f-fecha" placeholder="Seleccioná una fecha" readonly style="cursor:pointer;padding-right:44px;" onclick="toggleCal()">
          <button class="input-icon-btn" onclick="toggleCal()" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5C3.9 3 3 3.9 3 5v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
          </button>
          <div class="picker-dropdown" id="cal-dropdown">
            <div class="cal-header">
              <button class="cal-nav" onclick="calNav(-1)" type="button">&#8249;</button>
              <span class="cal-month-label" id="cal-month-label"></span>
              <button class="cal-nav" onclick="calNav(1)" type="button">&#8250;</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
          </div>
        </div>
      </div>

      <div class="field">
        <label>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 5v6l5.25 3.15-.75 1.23L11 14V7h1.5z"/></svg>
          Hora
        </label>
        <div class="input-wrap" style="position:relative">
          <input type="text" id="f-hora" placeholder="Seleccioná la hora" readonly style="cursor:pointer;padding-right:44px;" onclick="toggleTime()">
          <button class="input-icon-btn" onclick="toggleTime()" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 5v6l5.25 3.15-.75 1.23L11 14V7h1.5z"/></svg>
          </button>
          <div class="picker-dropdown" id="time-dropdown">
            <div class="time-picker">
              <div class="time-col">
                <span class="time-label">Hora</span>
                <div class="time-spin">
                  <button onclick="spinTime('h',1)" type="button">▲</button>
                  <div class="time-val" id="t-h">18</div>
                  <button onclick="spinTime('h',-1)" type="button">▼</button>
                </div>
              </div>
              <span class="time-sep">:</span>
              <div class="time-col">
                <span class="time-label">Min</span>
                <div class="time-spin">
                  <button onclick="spinTime('m',1)" type="button">▲</button>
                  <div class="time-val" id="t-m">00</div>
                  <button onclick="spinTime('m',-1)" type="button">▼</button>
                </div>
              </div>
            </div>
            <button class="time-confirm" onclick="confirmTime()" type="button">Confirmar</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          Lugar
        </label>
        <div class="input-wrap">
          <input type="text" id="f-lugar" placeholder="Dirección o buscá en el mapa" style="padding-right:44px">
          <button class="input-icon-btn" onclick="openMap()" type="button" title="Buscar en mapa">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <div class="btn-preview-wrap">
    <button class="btn-preview" onclick="showPreview()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Ver invitación
    </button>
  </div>

  <div class="form-footer">
    <div class="form-footer-dot active"></div>
    <div class="form-footer-dot"></div>
    <span class="form-footer-text">Paso 1 de 2</span>
  </div>

</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- ══════════════════ MAPA MODAL ══════════════════ -->
<div id="map-modal">
  <div class="map-container">
    <div class="map-header">
      <h3>Seleccioná el lugar</h3>
      <button class="map-close" onclick="closeMap()">✕</button>
    </div>
    <div id="map-search-wrap">
      <input id="map-search" type="text" placeholder="Buscar cualquier dirección..." oninput="searchAddress(this.value)">
      <ul id="map-suggestions"></ul>
    </div>
    <div id="map-click-hint">📍 Hacé click en el mapa para marcar el lugar exacto</div>
    <div id="map-frame-wrap"><div id="leaflet-map"></div></div>
    <div id="map-selected-info"></div>
    <button class="map-confirm-btn" onclick="confirmMapAddress()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      Confirmar dirección
    </button>
  </div>
</div>

<!-- ══════════════════ PÁGINA 2: PREVIEW ══════════════════ -->
<div id="page-preview">
  <div class="preview-topbar">
    <button class="btn-back" onclick="showForm()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Editar
    </button>
    <span class="preview-label">Vista previa</span>
    <div style="width:72px"></div>
  </div>

  <div id="invitation-card">
    <img class="inv-bg-img" src="https://raw.githubusercontent.com/valentinortega/trulli/refs/heads/main/invitacion.png" alt="" crossorigin="anonymous">
    <div class="inv-overlay">
      <div class="inv-header-block">
        <div class="inv-hola-line">Hola <span id="out-para" class="inv-nombre-invitado">Invitado</span> 👋🏻</div>
        <div class="inv-anfitrion-line"><span id="out-anfitrion" class="inv-anfitrion-nombre">Anfitrión</span> te ha invitado a una</div>
      </div>
      <div class="inv-info-block">
        <div class="inv-info-row">
          <svg class="inv-info-icon" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5C3.9 3 3 3.9 3 5v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
          <div class="inv-info-text" id="out-fecha-hora">Fecha y hora por confirmar</div>
        </div>
        <div class="inv-info-row">
          <svg class="inv-info-icon" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          <div class="inv-info-text" id="out-lugar">Dirección del evento</div>
        </div>
      </div>
      <div class="inv-ig">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="#95CEBB"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
        <span>@trulli.pijamadas</span>
      </div>
    </div>
  </div>

  <div class="action-btns">
    <button class="btn-action btn-download" id="btn-dl" onclick="downloadImage()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar
    </button>
    <button class="btn-action btn-share" onclick="shareImage()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Compartir
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DIAS=['Do','Lu','Ma','Mi','Ju','Vi','Sa'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_LARGO=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_LARGO=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
let calDate=new Date(),calSelected=null;

function toggleCal(){const dd=document.getElementById('cal-dropdown');document.getElementById('time-dropdown').classList.remove('open');const isOpen=dd.classList.toggle('open');document.getElementById('overlay').classList.toggle('open',isOpen);if(isOpen)renderCal();}
function calNav(dir){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);renderCal();}
function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('cal-month-label').textContent=MESES[m]+' '+y;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  DIAS.forEach(d=>{const el=document.createElement('div');el.className='cal-day-name';el.textContent=d;grid.appendChild(el);});
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);}
  for(let d=1;d<=days;d++){
    const el=document.createElement('div');el.className='cal-day';el.textContent=d;
    if(today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y)el.classList.add('today');
    if(calSelected&&calSelected.getDate()===d&&calSelected.getMonth()===m&&calSelected.getFullYear()===y)el.classList.add('selected');
    el.onclick=()=>selectDay(y,m,d);grid.appendChild(el);
  }
}
function selectDay(y,m,d){
  calSelected=new Date(y,m,d);
  const dc=DIAS_LARGO[calSelected.getDay()],mc=MESES_LARGO[m];
  document.getElementById('f-fecha').value=`${dc.charAt(0).toUpperCase()+dc.slice(1)} ${d} de ${mc.charAt(0).toUpperCase()+mc.slice(1)}`;
  closeAll();updateCard();
}

let tH=18,tM=0;
function toggleTime(){const dd=document.getElementById('time-dropdown');document.getElementById('cal-dropdown').classList.remove('open');const isOpen=dd.classList.toggle('open');document.getElementById('overlay').classList.toggle('open',isOpen);}
function spinTime(part,dir){if(part==='h'){tH=(tH+dir+24)%24;document.getElementById('t-h').textContent=String(tH).padStart(2,'0');}else{tM=(tM+dir*15+60)%60;document.getElementById('t-m').textContent=String(tM).padStart(2,'0');}}
function confirmTime(){document.getElementById('f-hora').value=String(tH).padStart(2,'0')+':'+String(tM).padStart(2,'0')+' hs';closeAll();updateCard();}
function closeAll(){document.getElementById('cal-dropdown').classList.remove('open');document.getElementById('time-dropdown').classList.remove('open');document.getElementById('overlay').classList.remove('open');}

let mapSelectedAddress='',mapSelectedLat=null,mapSelectedLon=null,searchTimeout=null,leafletMap=null,leafletMarker=null;
function openMap(){
  document.getElementById('map-modal').classList.add('open');
  setTimeout(()=>{
    if(!leafletMap){
      leafletMap=L.map('leaflet-map').setView([-31.5375,-68.5364],13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(leafletMap);
      const ci=L.divIcon({html:`<div style="width:28px;height:28px;background:linear-gradient(135deg,#5BB8B0,#4AA9A1);border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.25);"></div>`,iconSize:[28,28],iconAnchor:[14,28],className:''});
      leafletMap.on('click',async(e)=>{
        const{lat,lng}=e.latlng;setMapMarker(lat,lng,ci);
        document.getElementById('map-selected-info').innerHTML=`<span style="color:#aaa;font-style:italic">Buscando dirección...</span>`;
        try{
          const res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=es`,{headers:{'User-Agent':'TrulliPijamadas/1.0','Accept-Language':'es'}});
          const data=await res.json();const addr=data.address||{};
          let street=addr.road||addr.pedestrian||'',number=addr.house_number||'',orientation='';
          if(number){const m2=number.match(/^(\d+)\s*\(?([ONESones])\)?/);if(m2){number=m2[1];orientation=' ('+m2[2].toUpperCase()+')';}}
          const city=addr.city||addr.town||addr.village||addr.county||'';
          let parts=[];if(street){let sp=street;if(number)sp+=' '+number+orientation;parts.push(sp);}if(city)parts.push(city);
          const formatted=parts.length?parts.join(', '):data.display_name.split(',').slice(0,3).join(', ');
          mapSelectedAddress=formatted;mapSelectedLat=lat;mapSelectedLon=lng;
          document.getElementById('map-selected-info').innerHTML=`📍 <span>${formatted}</span>`;
          document.getElementById('map-search').value=formatted;
        }catch(err){document.getElementById('map-selected-info').innerHTML=`<span style="color:#e07a5f">No se pudo obtener la dirección.</span>`;}
      });
    }else{leafletMap.invalidateSize();}
  },150);
}
function setMapMarker(lat,lng,icon){
  if(!icon)icon=L.divIcon({html:`<div style="width:28px;height:28px;background:linear-gradient(135deg,#5BB8B0,#4AA9A1);border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.25);"></div>`,iconSize:[28,28],iconAnchor:[14,28],className:''});
  if(leafletMarker)leafletMap.removeLayer(leafletMarker);
  leafletMarker=L.marker([lat,lng],{icon}).addTo(leafletMap);
  leafletMap.setView([lat,lng],Math.max(leafletMap.getZoom(),16));
}
function closeMap(){document.getElementById('map-modal').classList.remove('open');document.getElementById('map-suggestions').classList.remove('open');document.getElementById('map-suggestions').innerHTML='';}
function searchAddress(val){
  clearTimeout(searchTimeout);const sug=document.getElementById('map-suggestions');
  if(val.length<3){sug.classList.remove('open');sug.innerHTML='';return;}
  searchTimeout=setTimeout(async()=>{
    try{
      const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(val)}&format=json&limit=6&addressdetails=1`,{headers:{'User-Agent':'TrulliPijamadas/1.0','Accept-Language':'es'}});
      const data=await res.json();sug.innerHTML='';
      if(!data.length){sug.innerHTML='<li style="color:#aaa;cursor:default">Sin resultados</li>';sug.classList.add('open');return;}
      data.forEach(item=>{const li=document.createElement('li');const addr=item.address;let fmt='';if(addr.road){fmt=addr.road;if(addr.house_number)fmt+=' '+addr.house_number;const c=addr.city||addr.town||addr.village||addr.suburb||'';if(c)fmt+=', '+c;if(addr.country)fmt+=', '+addr.country;}else{fmt=item.display_name.split(',').slice(0,3).join(', ');}li.textContent=fmt;li.onclick=()=>selectMapAddress(fmt,item.lat,item.lon);sug.appendChild(li);});
      sug.classList.add('open');
    }catch(e){console.error(e);}
  },400);
}
function selectMapAddress(address,lat,lon){mapSelectedAddress=address;mapSelectedLat=parseFloat(lat);mapSelectedLon=parseFloat(lon);document.getElementById('map-search').value=address;document.getElementById('map-suggestions').classList.remove('open');document.getElementById('map-selected-info').innerHTML=`📍 <span>${address}</span>`;if(leafletMap)setMapMarker(mapSelectedLat,mapSelectedLon);}
function confirmMapAddress(){const val=mapSelectedAddress||document.getElementById('map-search').value;if(val){document.getElementById('f-lugar').value=val;updateCard();}closeMap();}

function updateCard(){
  const para=document.getElementById('f-para').value.trim(),anfitrion=document.getElementById('f-anfitrion').value.trim();
  const fecha=document.getElementById('f-fecha').value.trim(),hora=document.getElementById('f-hora').value.trim(),lugar=document.getElementById('f-lugar').value.trim();
  document.getElementById('out-para').textContent=para||'Invitado';
  document.getElementById('out-anfitrion').textContent=anfitrion||'Anfitrión';
  const outFH=document.getElementById('out-fecha-hora');
  let fht='';if(fecha&&hora)fht=fecha+'  ·  '+hora;else if(fecha)fht=fecha;else if(hora)fht=hora;
  if(fht){outFH.textContent=fht;outFH.classList.remove('empty');}else{outFH.textContent='Fecha y hora por confirmar';outFH.classList.add('empty');}
  const outL=document.getElementById('out-lugar');
  if(lugar){outL.textContent=lugar;outL.classList.remove('empty');}else{outL.textContent='Dirección del evento';outL.classList.add('empty');}
}
['f-para','f-lugar','f-anfitrion'].forEach(id=>document.getElementById(id).addEventListener('input',updateCard));

function showPreview(){updateCard();document.getElementById('page-form').style.display='none';document.getElementById('page-preview').style.display='flex';window.scrollTo(0,0);}
function showForm(){document.getElementById('page-form').style.display='flex';document.getElementById('page-preview').style.display='none';}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
async function captureCard(){return await html2canvas(document.getElementById('invitation-card'),{scale:2,useCORS:true,allowTaint:false,backgroundColor:'#95CEBB',logging:false});}
async function downloadImage(){
  const btn=document.getElementById('btn-dl');btn.disabled=true;btn.textContent='Generando...';
  try{const canvas=await captureCard();const link=document.createElement('a');const nombre=document.getElementById('f-para').value||'invitacion';link.download='trulli-'+nombre.toLowerCase().replace(/\s+/g,'-')+'.png';link.href=canvas.toDataURL('image/png');link.click();showToast('✓ Invitación descargada');}
  catch(e){showToast('Error al generar imagen');}
  btn.disabled=false;btn.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Descargar';
}
async function shareImage(){
  try{const canvas=await captureCard();canvas.toBlob(async blob=>{const nombre=document.getElementById('f-para').value||'invitacion';const file=new File([blob],'trulli-'+nombre.toLowerCase().replace(/\s+/g,'-')+'.png',{type:'image/png'});if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:'¡Pijamada Trulli!',text:'¡Estás invitado/a! 🌙'});}catch(e){if(e.name!=='AbortError')fallbackDl(canvas);}}else{fallbackDl(canvas);}
  },'image/png');}catch(e){showToast('Error al compartir');}
}
function fallbackDl(canvas){const link=document.createElement('a');link.download='trulli-pijamada.png';link.href=canvas.toDataURL('image/png');link.click();showToast('Guardá la imagen y compartila por WhatsApp');}

renderCal();updateCard();
</script>
</body>
